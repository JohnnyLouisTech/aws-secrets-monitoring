AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Real-Time Sensitive Secrets Monitoring and Alerting in AWS.
  Deploys Secrets Manager secret, CloudTrail trail, S3 bucket, CloudWatch Logs,
  metric filter, alarm, and SNS topic with email subscription.

Parameters:
  NotificationEmail:
    Type: String
    Description: Email address to receive security alerts.
    AllowedPattern: '^[^@]+@[^@]+\.[^@]+$'

  SecretName:
    Type: String
    Default: TopSecretInfo
    Description: Name of the secret stored in Secrets Manager.

  TrailName:
    Type: String
    Default: nextwork-secrets-manager-trail
    Description: Name of the CloudTrail trail.

  LogGroupName:
    Type: String
    Default: nextwork-secretsmanager-loggroup
    Description: CloudWatch Logs log group name.

  AlarmName:
    Type: String
    Default: SecretIsAccessedAlarm
    Description: Name of the CloudWatch alarm.

Resources:

  # ---------------- Secrets Manager ----------------
  SensitiveSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref SecretName
      Description: Simulated production credential used for monitoring testing.
      SecretString: '{"username":"admin","password":"REPLACE_ME"}'

  # ---------------- S3 bucket for CloudTrail ----------------
  TrailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${AWS::AccountId}-${TrailName}-logs'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  TrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TrailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt TrailBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${TrailBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control

  # ---------------- CloudWatch Logs ----------------
  TrailLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Ref LogGroupName
      RetentionInDays: 30

  TrailLogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${TrailName}-cwlogs-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WriteToCloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt TrailLogGroup.Arn

  # ---------------- CloudTrail ----------------
  Trail:
    Type: AWS::CloudTrail::Trail
    DependsOn:
      - TrailBucketPolicy
    Properties:
      TrailName: !Ref TrailName
      S3BucketName: !Ref TrailBucket
      IsLogging: true
      IsMultiRegionTrail: false
      IncludeGlobalServiceEvents: true
      EnableLogFileValidation: true
      CloudWatchLogsLogGroupArn: !GetAtt TrailLogGroup.Arn
      CloudWatchLogsRoleArn: !GetAtt TrailLogRole.Arn
      EventSelectors:
        - ReadWriteType: All
          IncludeManagementEvents: true

  # ---------------- SNS Topic + Subscription ----------------
  SecurityAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: SecurityAlerts
      DisplayName: Security Alerts

  EmailSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SecurityAlertsTopic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  # ---------------- Metric Filter ----------------
  SecretAccessMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref TrailLogGroup
      FilterPattern: '{ $.eventName = "GetSecretValue" }'
      MetricTransformations:
        - MetricName: SecretIsAccessed
          MetricNamespace: SecurityMetrics
          MetricValue: '1'
          DefaultValue: 0

  # ---------------- Alarm ----------------
  SecretAccessAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Ref AlarmName
      AlarmDescription: >
        This alarm goes off whenever a secret in Secrets Manager is accessed
        (GetSecretValue API call detected via CloudTrail).
      Namespace: SecurityMetrics
      MetricName: SecretIsAccessed
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref SecurityAlertsTopic

Outputs:
  SecretArn:
    Description: ARN of the monitored secret
    Value: !Ref SensitiveSecret
  TrailArn:
    Description: ARN of the CloudTrail trail
    Value: !GetAtt Trail.Arn
  LogGroupName:
    Description: CloudWatch Logs log group
    Value: !Ref TrailLogGroup
  SnsTopicArn:
    Description: SNS topic for security alerts
    Value: !Ref SecurityAlertsTopic
  AlarmName:
    Description: CloudWatch alarm name
    Value: !Ref SecretAccessAlarm
