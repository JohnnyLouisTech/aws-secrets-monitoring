<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#232F3E"/>
    </marker>
    <linearGradient id="awsOrange" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#FF9900"/>
      <stop offset="1" stop-color="#E47911"/>
    </linearGradient>
    <linearGradient id="awsBlue" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3B6BB5"/>
      <stop offset="1" stop-color="#232F3E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="980" height="520" fill="#FAFBFC"/>

  <!-- Title -->
  <text x="490" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#232F3E">Real-Time Sensitive Secrets Monitoring &amp; Alerting</text>
  <text x="490" y="60" text-anchor="middle" font-size="13" fill="#5A6B7B">AWS Secrets Manager → CloudTrail → CloudWatch → SNS</text>

  <!-- User -->
  <g transform="translate(40,200)" filter="url(#shadow)">
    <rect width="120" height="90" rx="10" fill="white" stroke="#D5DBDB" stroke-width="1.5"/>
    <circle cx="60" cy="34" r="14" fill="#5A6B7B"/>
    <rect x="40" y="50" width="40" height="22" rx="6" fill="#5A6B7B"/>
    <text x="60" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="#232F3E">IAM User</text>
  </g>
  <text x="100" y="310" text-anchor="middle" font-size="10" fill="#5A6B7B">Console / CLI</text>

  <!-- Secrets Manager -->
  <g transform="translate(210,200)" filter="url(#shadow)">
    <rect width="140" height="90" rx="10" fill="url(#awsOrange)"/>
    <text x="70" y="32" text-anchor="middle" font-size="12" font-weight="700" fill="white">AWS Secrets</text>
    <text x="70" y="48" text-anchor="middle" font-size="12" font-weight="700" fill="white">Manager</text>
    <text x="70" y="70" text-anchor="middle" font-size="10" fill="white" opacity="0.95">TopSecretInfo</text>
  </g>

  <!-- CloudTrail -->
  <g transform="translate(400,200)" filter="url(#shadow)">
    <rect width="140" height="90" rx="10" fill="url(#awsBlue)"/>
    <text x="70" y="34" text-anchor="middle" font-size="12" font-weight="700" fill="white">CloudTrail</text>
    <text x="70" y="54" text-anchor="middle" font-size="10" fill="white" opacity="0.95">Management Events</text>
    <text x="70" y="70" text-anchor="middle" font-size="10" fill="white" opacity="0.95">Read + Write</text>
  </g>

  <!-- S3 (parallel destination) -->
  <g transform="translate(400,80)" filter="url(#shadow)">
    <rect width="140" height="70" rx="10" fill="#7AA116"/>
    <text x="70" y="32" text-anchor="middle" font-size="12" font-weight="700" fill="white">Amazon S3</text>
    <text x="70" y="50" text-anchor="middle" font-size="10" fill="white" opacity="0.95">Raw audit logs</text>
  </g>

  <!-- CloudWatch Logs -->
  <g transform="translate(590,200)" filter="url(#shadow)">
    <rect width="140" height="90" rx="10" fill="#CC2264"/>
    <text x="70" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="white">CloudWatch</text>
    <text x="70" y="46" text-anchor="middle" font-size="12" font-weight="700" fill="white">Logs</text>
    <text x="70" y="66" text-anchor="middle" font-size="9" fill="white" opacity="0.95">nextwork-secretsmanager</text>
    <text x="70" y="78" text-anchor="middle" font-size="9" fill="white" opacity="0.95">-loggroup</text>
  </g>

  <!-- Metric Filter -->
  <g transform="translate(590,330)" filter="url(#shadow)">
    <rect width="140" height="70" rx="10" fill="white" stroke="#CC2264" stroke-width="2"/>
    <text x="70" y="28" text-anchor="middle" font-size="11" font-weight="700" fill="#CC2264">Metric Filter</text>
    <text x="70" y="46" text-anchor="middle" font-size="10" fill="#232F3E">eventName =</text>
    <text x="70" y="60" text-anchor="middle" font-size="10" font-family="monospace" fill="#232F3E">"GetSecretValue"</text>
  </g>

  <!-- Alarm -->
  <g transform="translate(780,330)" filter="url(#shadow)">
    <rect width="160" height="70" rx="10" fill="#CC2264"/>
    <text x="80" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="white">CloudWatch Alarm</text>
    <text x="80" y="46" text-anchor="middle" font-size="10" fill="white" opacity="0.95">Sum ≥ 1 / 5 min</text>
    <text x="80" y="60" text-anchor="middle" font-size="10" fill="white" opacity="0.95">SecretIsAccessed</text>
  </g>

  <!-- SNS -->
  <g transform="translate(780,200)" filter="url(#shadow)">
    <rect width="160" height="90" rx="10" fill="url(#awsOrange)"/>
    <text x="80" y="34" text-anchor="middle" font-size="12" font-weight="700" fill="white">Amazon SNS</text>
    <text x="80" y="54" text-anchor="middle" font-size="10" fill="white" opacity="0.95">Topic: Security Alerts</text>
    <text x="80" y="70" text-anchor="middle" font-size="10" fill="white" opacity="0.95">Email subscription</text>
  </g>

  <!-- Email -->
  <g transform="translate(820,80)" filter="url(#shadow)">
    <rect width="80" height="70" rx="10" fill="white" stroke="#D5DBDB" stroke-width="1.5"/>
    <text x="40" y="38" text-anchor="middle" font-size="22">📧</text>
    <text x="40" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#232F3E">SOC Inbox</text>
  </g>

  <!-- Arrows -->
  <line x1="160" y1="245" x2="205" y2="245" stroke="#232F3E" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="183" y="237" text-anchor="middle" font-size="9" fill="#5A6B7B">GetSecretValue</text>

  <line x1="350" y1="245" x2="395" y2="245" stroke="#232F3E" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="372" y="237" text-anchor="middle" font-size="9" fill="#5A6B7B">API call</text>

  <line x1="470" y1="200" x2="470" y2="155" stroke="#232F3E" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="540" y1="245" x2="585" y2="245" stroke="#232F3E" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="562" y="237" text-anchor="middle" font-size="9" fill="#5A6B7B">stream</text>

  <line x1="660" y1="290" x2="660" y2="325" stroke="#232F3E" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="730" y1="365" x2="775" y2="365" stroke="#232F3E" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="752" y="357" text-anchor="middle" font-size="9" fill="#5A6B7B">+1</text>

  <line x1="860" y1="330" x2="860" y2="295" stroke="#232F3E" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="875" y="315" font-size="9" fill="#5A6B7B">trigger</text>

  <line x1="860" y1="200" x2="860" y2="155" stroke="#232F3E" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="875" y="180" font-size="9" fill="#5A6B7B">notify</text>

  <!-- Legend / footer -->
  <text x="490" y="490" text-anchor="middle" font-size="10" fill="#5A6B7B">github.com/JohnnyLouisTech · MIT License</text>
</svg>
